modLoader = "javafml"
loaderVersion = "[4,)"
#issueTrackerURL = ""
license = "${modLicense}"

[[mods]]
modId = "${modId}"
version = "${modVersion}"
displayName = "InteractiveMC"
authors = "${modAuthor}"
description = '''
${modDescription}
'''
#logoFile = ""

[[dependencies.${modId}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoForgeVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "minecraft"
type = "required"
versionRange = "[${minMinecraftVersion},${minecraftVersion}]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "architectury"
type = "required"
versionRange = "[${architecturyApiVersion},)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "${modId}-common.mixins.json"
